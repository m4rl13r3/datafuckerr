name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  interface-qt:
    name: Interface Qt — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Installer les bibliothèques Qt Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-3 libegl1 libfontconfig1 libgl1 libglib2.0-0 libxkbcommon0
      - name: Installer Qt pour Python
        run: python -m pip install --disable-pip-version-check -r ui/requirements.txt
      - name: Tester les garde-fous et l’interface réelle
        run: python -m unittest ui.test_diskpurge_commands ui.test_datafuckerr_qt -v

  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Configurer CMake
        run: cmake -S . -B cmake-build -DCMAKE_BUILD_TYPE=Release
      - name: Compiler avec CMake
        if: runner.os != 'Windows'
        run: cmake --build cmake-build --config Release --parallel
      - name: Compiler avec CMake sous Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = & cmake --build cmake-build --config Release --parallel 2>&1
          $status = $LASTEXITCODE
          $output | ForEach-Object { Write-Output $_ }
          if ($status -ne 0) {
              $diagnostics = $output | Where-Object { $_ -match 'fatal error|error C[0-9]+|warning C[0-9]+|error LNK[0-9]+' } | Select-Object -First 20
              foreach ($diagnostic in $diagnostics) {
                  $escaped = $diagnostic.ToString().Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
                  Write-Output "::error::$escaped"
              }
              exit $status
          }
      - name: Tester avec CTest
        if: runner.os != 'Windows'
        run: ctest --test-dir cmake-build -C Release --output-on-failure
      - name: Tester avec CTest sous Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = & ctest --test-dir cmake-build -C Release --output-on-failure 2>&1
          $status = $LASTEXITCODE
          $output | ForEach-Object { Write-Output $_ }
          if ($status -ne 0) {
              $failureOutput = $output | Select-Object -Last 50
              foreach ($line in $failureOutput) {
                  $escaped = $line.ToString().Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
                  Write-Output "::error::$escaped"
              }
              exit $status
          }
      - name: Vérifier le Makefile
        if: runner.os != 'Windows'
        run: make clean && make -j2 && make test

  applications-natives:
    name: Application native — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            binary: native-cmake/diskpurge
          - os: macos-15
            binary: native-cmake/diskpurge
          - os: windows-2025
            binary: native-cmake/Release/diskpurge.exe
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ui/requirements.txt
            packaging/native/requirements.txt
      - name: Installer les bibliothèques Qt Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-3 libegl1 libfontconfig1 libgl1 libglib2.0-0 libxkbcommon0
      - name: Construire le moteur standard
        run: |
          cmake -S . -B native-cmake -DCMAKE_BUILD_TYPE=Release -DDISKPURGE_ENABLE_LAB_MODE=OFF
          cmake --build native-cmake --config Release --target diskpurge --parallel 2
      - name: Tester le smoke AppImage sans affichage
        if: runner.os == 'Linux'
        run: python -m unittest tools.release.test_build_native -v
      - name: Installer les dépendances de construction native
        run: python -m pip install --disable-pip-version-check -r ui/requirements.txt -r packaging/native/requirements.txt
      - name: Préparer appimagetool
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -fsSL -o "$RUNNER_TEMP/appimagetool" https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          echo "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0  $RUNNER_TEMP/appimagetool" | sha256sum --check --strict
          chmod +x "$RUNNER_TEMP/appimagetool"
      - name: Préparer Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP 'innosetup.exe'
          $directory = Join-Path $env:RUNNER_TEMP 'InnoSetup'
          Invoke-WebRequest -Uri 'https://github.com/jrsoftware/issrc/releases/download/is-7_0_2/innosetup-7.0.2-x64.exe' -OutFile $installer
          $actual = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne '5ad54ca3def786f8f4212552e54cc6d8d61329e2d24a1cfee0571d42c2684ff1') {
              throw 'La somme SHA-256 de Inno Setup est invalide.'
          }
          $process = Start-Process -FilePath $installer -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-', "/DIR=$directory" -PassThru -Wait
          if ($process.ExitCode -ne 0) {
              throw "L’installation de Inno Setup a échoué avec le code $($process.ExitCode)."
          }
      - name: Construire l’AppImage
        if: runner.os == 'Linux'
        run: python tools/release/build_native.py --binary "${{ matrix.binary }}" --platform "${{ runner.os }}-${{ runner.arch }}" --output-dir native-out --work-dir native-work --appimagetool "$RUNNER_TEMP/appimagetool"
      - name: Construire le DMG
        if: runner.os == 'macOS'
        run: python tools/release/build_native.py --binary "${{ matrix.binary }}" --platform "${{ runner.os }}-${{ runner.arch }}" --output-dir native-out --work-dir native-work
      - name: Construire l’installateur Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: python tools/release/build_native.py --binary "${{ matrix.binary }}" --platform "${{ runner.os }}-${{ runner.arch }}" --output-dir native-out --work-dir native-work --inno-compiler "$env:RUNNER_TEMP/InnoSetup/ISCC.exe"
      - name: Vérifier le paquet natif
        run: python tools/release/verify_native.py native-out

  sanitizers:
    name: Sanitizers — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Configurer les sanitizers
        run: cmake -S . -B sanitizer-build -DCMAKE_BUILD_TYPE=Debug -DDISKPURGE_ENABLE_SANITIZERS=ON
      - name: Compiler avec les sanitizers
        run: cmake --build sanitizer-build --parallel
      - name: Tester avec les sanitizers
        env:
          ASAN_OPTIONS: abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir sanitizer-build --output-on-failure

  isolated-lab:
    name: Build laboratoire sans périphérique réel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Configurer le build laboratoire
        run: cmake -S . -B lab-build -DCMAKE_BUILD_TYPE=Release -DDISKPURGE_ENABLE_LAB_MODE=ON
      - name: Compiler
        run: cmake --build lab-build --parallel
      - name: Vérifier le marquage et les garde-fous virtuels
        run: ctest --test-dir lab-build --output-on-failure

  fuzzing:
    name: Fuzzing non destructif
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Configurer les harnais libFuzzer
        run: cmake -S . -B fuzz-build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang -DDISKPURGE_ENABLE_FUZZING=ON
      - name: Compiler les harnais
        run: cmake --build fuzz-build --parallel --target diskpurge_fuzz_audit diskpurge_fuzz_nvme
      - name: Fuzzer le schéma d’audit
        run: ./fuzz-build/diskpurge_fuzz_audit -runs=2000 fuzz/corpus/audit
      - name: Fuzzer les réponses Identify NVMe
        run: ./fuzz-build/diskpurge_fuzz_nvme -runs=2000 fuzz/corpus/nvme
