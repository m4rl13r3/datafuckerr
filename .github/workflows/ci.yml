name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  interface-qt:
    name: Interface Qt — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Installer les bibliothèques Qt Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-3 libegl1 libfontconfig1 libgl1 libglib2.0-0 libxkbcommon0
      - name: Installer Qt pour Python
        run: python -m pip install --disable-pip-version-check -r ui/requirements.txt
      - name: Tester les garde-fous et l’interface réelle
        run: python -m unittest ui.test_diskpurge_commands ui.test_datafuckerr_qt -v

  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Configurer CMake
        run: cmake -S . -B cmake-build -DCMAKE_BUILD_TYPE=Release
      - name: Compiler avec CMake
        if: runner.os != 'Windows'
        run: cmake --build cmake-build --config Release --parallel
      - name: Compiler avec CMake sous Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = & cmake --build cmake-build --config Release --parallel 2>&1
          $status = $LASTEXITCODE
          $output | ForEach-Object { Write-Output $_ }
          if ($status -ne 0) {
              $diagnostics = $output | Where-Object { $_ -match 'fatal error|error C[0-9]+|error LNK[0-9]+' } | Select-Object -First 20
              foreach ($diagnostic in $diagnostics) {
                  $escaped = $diagnostic.ToString().Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
                  Write-Output "::error::$escaped"
              }
              exit $status
          }
      - name: Tester avec CTest
        run: ctest --test-dir cmake-build -C Release --output-on-failure
      - name: Vérifier le Makefile
        if: runner.os != 'Windows'
        run: make clean && make -j2 && make test

  sanitizers:
    name: Sanitizers — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Configurer les sanitizers
        run: cmake -S . -B sanitizer-build -DCMAKE_BUILD_TYPE=Debug -DDISKPURGE_ENABLE_SANITIZERS=ON
      - name: Compiler avec les sanitizers
        run: cmake --build sanitizer-build --parallel
      - name: Tester avec les sanitizers
        env:
          ASAN_OPTIONS: abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir sanitizer-build --output-on-failure

  isolated-lab:
    name: Build laboratoire sans périphérique réel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Configurer le build laboratoire
        run: cmake -S . -B lab-build -DCMAKE_BUILD_TYPE=Release -DDISKPURGE_ENABLE_LAB_MODE=ON
      - name: Compiler
        run: cmake --build lab-build --parallel
      - name: Vérifier le marquage et les garde-fous virtuels
        run: ctest --test-dir lab-build --output-on-failure

  fuzzing:
    name: Fuzzing non destructif
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Configurer les harnais libFuzzer
        run: cmake -S . -B fuzz-build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang -DDISKPURGE_ENABLE_FUZZING=ON
      - name: Compiler les harnais
        run: cmake --build fuzz-build --parallel --target diskpurge_fuzz_audit diskpurge_fuzz_nvme
      - name: Fuzzer le schéma d’audit
        run: ./fuzz-build/diskpurge_fuzz_audit -runs=2000 fuzz/corpus/audit
      - name: Fuzzer les réponses Identify NVMe
        run: ./fuzz-build/diskpurge_fuzz_nvme -runs=2000 fuzz/corpus/nvme
