name: Publication

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publication-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Construire — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            binary: release-build/diskpurge
            python: python3
          - os: macos-15
            binary: release-build/diskpurge
            python: python3
          - os: windows-2025
            binary: release-build/Release/diskpurge.exe
            python: python
    steps:
      - name: Extraire les sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Installer Python 3.12
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ui/requirements.txt
            packaging/native/requirements.txt
      - name: Configurer la construction de publication
        run: cmake -S . -B release-build -DCMAKE_BUILD_TYPE=Release -DDISKPURGE_ENABLE_LAB_MODE=OFF -DDISKPURGE_ENABLE_SANITIZERS=OFF
      - name: Compiler
        run: cmake --build release-build --config Release --parallel
      - name: Tester
        run: ctest --test-dir release-build -C Release --output-on-failure
      - name: Préparer l’archive, la nomenclature et les sommes
        run: >-
          ${{ matrix.python }} tools/release/package_release.py
          --binary "${{ matrix.binary }}"
          --platform "${{ runner.os }}-${{ runner.arch }}"
          --output-dir release-out
          --repository "${{ github.repository }}"
          --source-commit "${{ github.sha }}"
          --expected-ref "${{ github.ref }}"
      - name: Vérifier le lot de publication
        run: ${{ matrix.python }} tools/release/verify_release.py release-out
      - name: Installer les bibliothèques Qt Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-3 libegl1 libfontconfig1 libgl1 libglib2.0-0 libxkbcommon0
      - name: Installer les dépendances de construction native
        run: python -m pip install --disable-pip-version-check -r ui/requirements.txt -r packaging/native/requirements.txt
      - name: Préparer appimagetool
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -fsSL -o "$RUNNER_TEMP/appimagetool" https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          echo "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0  $RUNNER_TEMP/appimagetool" | sha256sum --check --strict
          chmod +x "$RUNNER_TEMP/appimagetool"
      - name: Préparer Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP 'innosetup.exe'
          $directory = Join-Path $env:RUNNER_TEMP 'InnoSetup'
          Invoke-WebRequest -Uri 'https://github.com/jrsoftware/issrc/releases/download/is-7_0_2/innosetup-7.0.2-x64.exe' -OutFile $installer
          $actual = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne '5ad54ca3def786f8f4212552e54cc6d8d61329e2d24a1cfee0571d42c2684ff1') {
              throw 'La somme SHA-256 de Inno Setup est invalide.'
          }
          $process = Start-Process -FilePath $installer -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-', "/DIR=$directory" -PassThru -Wait
          if ($process.ExitCode -ne 0) {
              throw "L’installation de Inno Setup a échoué avec le code $($process.ExitCode)."
          }
      - name: Construire l’AppImage
        if: runner.os == 'Linux'
        run: python tools/release/build_native.py --binary "${{ matrix.binary }}" --platform "${{ runner.os }}-${{ runner.arch }}" --output-dir native-out --work-dir native-work --appimagetool "$RUNNER_TEMP/appimagetool"
      - name: Construire le DMG
        if: runner.os == 'macOS'
        run: python tools/release/build_native.py --binary "${{ matrix.binary }}" --platform "${{ runner.os }}-${{ runner.arch }}" --output-dir native-out --work-dir native-work
      - name: Construire l’installateur Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: python tools/release/build_native.py --binary "${{ matrix.binary }}" --platform "${{ runner.os }}-${{ runner.arch }}" --output-dir native-out --work-dir native-work --inno-compiler "$env:RUNNER_TEMP/InnoSetup/ISCC.exe"
      - name: Vérifier l’application native
        run: python tools/release/verify_native.py native-out
      - name: Attester la provenance GitHub
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: release-out/*
      - name: Attester l’application native
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: native-out/*
      - name: Conserver le lot de publication
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publication-${{ runner.os }}-${{ runner.arch }}
          path: release-out/*
          if-no-files-found: error
          retention-days: 30
      - name: Conserver l’application native
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: application-${{ runner.os }}-${{ runner.arch }}
          path: native-out/*
          if-no-files-found: error
          retention-days: 30

  build-iso:
    name: Construire — ISO Live amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Extraire les sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Construire l’ISO standard dans Debian 13
        run: |
          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            debian:trixie-slim@sha256:020c0d20b9880058cbe785a9db107156c3c75c2ac944a6aa7ab59f2add76a7bd \
            sh -lc 'apt-get update && apt-get install -y build-essential live-build && packaging/live/build.sh'
      - name: Vérifier l’image et son empreinte
        shell: bash
        run: |
          test "$(./build/diskpurge --version)" = "$(sed -n '1p' VERSION)"
          cd output/iso
          sha256sum --check --strict *.iso.sha256
      - name: Attester la provenance GitHub
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: output/iso/*
      - name: Conserver l’image amorçable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: image-live-amd64
          path: output/iso/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publier la GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - build-iso
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: publication
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Extraire les outils de vérification
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Télécharger les lots attestés
        shell: bash
        run: |
          gh run download "$GITHUB_RUN_ID" --pattern "publication-*" --dir "$RUNNER_TEMP/downloads"
          gh run download "$GITHUB_RUN_ID" --pattern "application-*" --dir "$RUNNER_TEMP/applications"
          gh run download "$GITHUB_RUN_ID" --name "image-live-amd64" --dir "$RUNNER_TEMP/image-live"
      - name: Revérifier chaque lot téléchargé
        shell: bash
        run: |
          package_count=0
          for package_dir in "$RUNNER_TEMP"/downloads/*; do
            test -d "$package_dir"
            python3 tools/release/verify_release.py "$package_dir"
            package_count=$((package_count + 1))
          done
          test "$package_count" -eq 3
      - name: Revérifier les applications téléchargées
        shell: bash
        run: |
          application_count=0
          for application_dir in "$RUNNER_TEMP"/applications/*; do
            test -d "$application_dir"
            python3 tools/release/verify_native.py "$application_dir"
            application_count=$((application_count + 1))
          done
          test "$application_count" -eq 3
      - name: Contrôler et rassembler les fichiers
        shell: bash
        run: |
          mkdir "$RUNNER_TEMP/files"
          while IFS= read -r -d '' source; do
            filename="$(basename "$source")"
            if [[ -e "$RUNNER_TEMP/files/$filename" ]]; then
              echo "Nom de fichier dupliqué : $filename" >&2
              exit 1
            fi
            cp "$source" "$RUNNER_TEMP/files/$filename"
          done < <(find "$RUNNER_TEMP/downloads" -type f -print0)
          while IFS= read -r -d '' source; do
            filename="$(basename "$source")"
            if [[ -e "$RUNNER_TEMP/files/$filename" ]]; then
              echo "Nom de fichier dupliqué : $filename" >&2
              exit 1
            fi
            cp "$source" "$RUNNER_TEMP/files/$filename"
          done < <(find "$RUNNER_TEMP/applications" -type f -print0)
          while IFS= read -r -d '' source; do
            filename="$(basename "$source")"
            if [[ -e "$RUNNER_TEMP/files/$filename" ]]; then
              echo "Nom de fichier dupliqué : $filename" >&2
              exit 1
            fi
            cp "$source" "$RUNNER_TEMP/files/$filename"
          done < <(find "$RUNNER_TEMP/image-live" -type f -print0)
          test "$(find "$RUNNER_TEMP/files" -type f | wc -l)" -eq 17
          cd "$RUNNER_TEMP/files"
          sha256sum --check --strict diskpurge-*.sha256
          sha256sum --check --strict datafuckerr-live-*.iso.sha256
          sha256sum --check --strict datafuckerr-*.sha256
      - name: Créer ou compléter la publication
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            options=(release create "$tag" --verify-tag --title "datafuckerr $tag" --generate-notes)
            if [[ "$tag" == v0.* || "$tag" == *-* ]]; then
              options+=(--prerelease)
            fi
            gh "${options[@]}"
          fi
          gh release upload "$tag" "$RUNNER_TEMP"/files/* --clobber
